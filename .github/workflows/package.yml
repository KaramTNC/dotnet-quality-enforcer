name: Package Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')

    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.x"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine pip-audit

      - name: Build wheel and source distribution
        run: python -m build

      - name: Publish Roslyn helper release asset
        shell: bash
        run: |
          mkdir -p release-assets/roslyn-helper
          dotnet publish tools/roslyn-analyzer/DotnetQualityRoslyn.csproj \
            --configuration Release \
            --no-self-contained \
            --output release-assets/roslyn-helper
          tar -czf "release-assets/dotnet-quality-roslyn-${GITHUB_REF_NAME:-snapshot}.tar.gz" \
            -C release-assets/roslyn-helper .

      - name: Validate distributions
        run: twine check dist/*

      - name: Add Roslyn helper to release distributions
        shell: bash
        run: cp release-assets/dotnet-quality-roslyn-*.tar.gz dist/

      - name: Generate release SBOM
        run: pip-audit . --format cyclonedx-json --output dist/sbom.json

      - name: Generate build metadata and checksums
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib

          metadata = {
              "schema_version": 1,
              "repository": os.environ.get("GITHUB_REPOSITORY"),
              "commit": os.environ.get("GITHUB_SHA"),
              "ref": os.environ.get("GITHUB_REF"),
              "workflow": os.environ.get("GITHUB_WORKFLOW"),
              "run_id": os.environ.get("GITHUB_RUN_ID"),
              "artifacts": sorted(path.name for path in pathlib.Path("dist").iterdir() if path.is_file()),
          }
          pathlib.Path("dist/BUILD-METADATA.json").write_text(
              json.dumps(metadata, indent=2) + "\n", encoding="utf-8"
          )
          PY
          sha256sum dist/* > dist/SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Verify package version metadata
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import zipfile

          wheels = list(pathlib.Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel, found {len(wheels)}")
          print(f"Built {wheels[0].name}")
          with zipfile.ZipFile(wheels[0]) as archive:
              metadata = next(
                  name for name in archive.namelist()
                  if name.endswith(".dist-info/METADATA")
              )
              version_line = next(
                  line for line in archive.read(metadata).decode().splitlines()
                  if line.startswith("Version: ")
              )
              print(version_line)
              release_tag = os.environ.get("GITHUB_REF_NAME", "")
              if release_tag.startswith("v") and version_line != f"Version: {release_tag[1:]}":
                  raise SystemExit(
                      f"Package version does not match release tag: {version_line} vs {release_tag}"
                  )
          PY

      - name: Upload distributions as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-quality-enforcer-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))

    permissions:
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dotnet-quality-enforcer-distributions
          path: dist

      - name: Create release for Main commit
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
          RELEASE_TAG: main-${{ github.event.workflow_run.head_sha }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --target "$RELEASE_SHA" \
              --title "Main build ${RELEASE_SHA:0:7}" \
              --generate-notes
          fi

      - name: Create release for version tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --target "$GITHUB_SHA" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
