name: Package Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')

    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "8.x"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine pip-audit

      - name: Build wheel and source distribution
        run: python -m build

      - name: Publish Roslyn helper release asset
        shell: bash
        run: |
          mkdir -p release-assets/roslyn-helper
          dotnet publish tools/roslyn-analyzer/DotnetQualityRoslyn.csproj \
            --configuration Release \
            --no-self-contained \
            --output release-assets/roslyn-helper
          tar -czf "release-assets/dotnet-quality-roslyn-${GITHUB_REF_NAME:-snapshot}.tar.gz" \
            -C release-assets/roslyn-helper .

      - name: Generate Roslyn helper SBOM
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from urllib.parse import quote
          from uuid import uuid4

          assets_path = Path("tools/roslyn-analyzer/obj/project.assets.json")
          assets = json.loads(assets_path.read_text(encoding="utf-8"))
          packages = {}
          for library in assets.get("libraries", {}):
              package_id, separator, version = library.partition("/")
              if not separator or not package_id or not version:
                  continue
              purl = f"pkg:nuget/{quote(package_id, safe='.-_')}@{quote(version, safe='.-_')}"
              packages[library] = {
                  "type": "library",
                  "bom-ref": purl,
                  "name": package_id,
                  "version": version,
                  "purl": purl,
                  "scope": "required",
              }

          bom = {
              "bomFormat": "CycloneDX",
              "specVersion": "1.5",
              "serialNumber": f"urn:uuid:{uuid4()}",
              "version": 1,
              "metadata": {
                  "component": {
                      "type": "application",
                      "name": "DotnetQualityRoslyn",
                  }
              },
              "components": sorted(packages.values(), key=lambda item: (item["name"], item["version"])),
          }
          Path("dist/roslyn-helper-sbom.json").write_text(
              json.dumps(bom, indent=2) + "\n", encoding="utf-8"
          )
          PY

      - name: Validate distributions
        run: twine check dist/*

      - name: Add Roslyn helper to release distributions
        shell: bash
        run: cp release-assets/dotnet-quality-roslyn-*.tar.gz dist/

      - name: Generate release SBOM
        run: pip-audit . --format cyclonedx-json --output dist/sbom.json

      - name: Generate build metadata and checksums
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib

          metadata = {
              "schema_version": 1,
              "repository": os.environ.get("GITHUB_REPOSITORY"),
              "commit": os.environ.get("GITHUB_SHA"),
              "ref": os.environ.get("GITHUB_REF"),
              "workflow": os.environ.get("GITHUB_WORKFLOW"),
              "run_id": os.environ.get("GITHUB_RUN_ID"),
              "artifacts": sorted(path.name for path in pathlib.Path("dist").iterdir() if path.is_file()),
          }
          pathlib.Path("dist/BUILD-METADATA.json").write_text(
              json.dumps(metadata, indent=2) + "\n", encoding="utf-8"
          )
          PY
          sha256sum dist/* > dist/SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: dist/*

      - name: Verify package version metadata
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import zipfile

          wheels = list(pathlib.Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel, found {len(wheels)}")
          print(f"Built {wheels[0].name}")
          with zipfile.ZipFile(wheels[0]) as archive:
              metadata = next(
                  name for name in archive.namelist()
                  if name.endswith(".dist-info/METADATA")
              )
              version_line = next(
                  line for line in archive.read(metadata).decode().splitlines()
                  if line.startswith("Version: ")
              )
              print(version_line)
              release_tag = os.environ.get("GITHUB_REF_NAME", "")
              if release_tag.startswith("v") and version_line != f"Version: {release_tag[1:]}":
                  raise SystemExit(
                      f"Package version does not match release tag: {version_line} vs {release_tag}"
                  )
          PY

      - name: Upload distributions as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dotnet-quality-enforcer-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))

    permissions:
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dotnet-quality-enforcer-distributions
          path: dist

      - name: Create release for Main commit
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
          RELEASE_TAG: main-${{ github.event.workflow_run.head_sha }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber --repo "$GH_REPO"
          else
            gh release create "$RELEASE_TAG" dist/* \
              --repo "$GH_REPO" \
              --target "$RELEASE_SHA" \
              --title "Main build ${RELEASE_SHA:0:7}" \
              --generate-notes
          fi

      - name: Create release for version tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber --repo "$GH_REPO"
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --repo "$GH_REPO" \
              --target "$GITHUB_SHA" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi

      - name: Update major compatibility tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          major="${version%%.*}"
          compatibility_tag="v${major}"
          compatibility_ref="refs/tags/${compatibility_tag}"

          if gh api "repos/${GH_REPO}/git/ref/tags/${compatibility_tag}" >/dev/null 2>&1; then
            gh api --method PATCH "repos/${GH_REPO}/git/refs/tags/${compatibility_tag}" \
              -f sha="${GITHUB_SHA}" \
              -F force=true >/dev/null
          else
            gh api --method POST "repos/${GH_REPO}/git/refs" \
              -f ref="${compatibility_ref}" \
              -f sha="${GITHUB_SHA}" >/dev/null
          fi

  publish-pypi:
    name: Publish Python package to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/dotnet-quality-gates

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dotnet-quality-enforcer-distributions
          path: dist

      - name: Select Python distributions
        shell: bash
        run: |
          mkdir -p pypi-dist
          cp dist/*.whl dist/dotnet_quality_gates-*.tar.gz pypi-dist/

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: pypi-dist/
